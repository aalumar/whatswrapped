<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsWrapped 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #09090b;
            --surface:   #18181b;
            --surface-2: #27272a;
            --border:    rgba(255,255,255,0.07);
            --text:      #fafafa;
            --muted:     #71717a;
            --green:     #4ade80;
            --purple:    #a78bfa;
            --pink:      #fb7185;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
            position: relative;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.10;
            pointer-events: none;
            animation: drift 12s ease-in-out infinite;
        }
        .orb-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, var(--purple), transparent 70%);
            top: -160px; right: -120px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, var(--green), transparent 70%);
            bottom: -120px; left: -120px;
            animation-delay: -6s;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(28px, -28px); }
        }

        .container {
            max-width: 560px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header { margin-bottom: 52px; }

        .eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            margin-bottom: 14px;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -0.045em;
            line-height: 1.05;
            margin-bottom: 10px;
        }
        .gradient-name {
            background: linear-gradient(135deg, var(--green) 0%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            margin-top: 10px;
        }

        .section-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #3f3f46;
            margin-bottom: 16px;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            list-style: none;
        }

        .chat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .chat-card:hover {
            border-color: rgba(255,255,255,0.14);
            box-shadow: 0 8px 36px rgba(0,0,0,0.35);
            transform: translateY(-2px);
        }
        .chat-card-link {
            display: flex;
            align-items: center;
            padding: 20px 24px;
            text-decoration: none;
            color: var(--text);
            gap: 16px;
        }

        .chat-icon {
            width: 46px; height: 46px;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--green), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
            flex-shrink: 0;
        }
        .chat-icon.locked { background: var(--surface-2); }

        .chat-info { flex: 1; min-width: 0; }
        .chat-name {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-sub { font-size: 0.8rem; color: var(--muted); }

        .chat-arrow {
            color: var(--muted);
            font-size: 1.1rem;
            flex-shrink: 0;
            transition: transform 0.2s, color 0.2s;
        }
        .chat-card:hover .chat-arrow {
            transform: translateX(5px);
            color: var(--green);
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 48px 20px;
            font-size: 0.95rem;
        }

        @media (max-width: 480px) {
            body { padding: 32px 16px; }
            h1 { font-size: 2.5rem; }
            .chat-card-link,
            .chat-card-locked { padding: 16px 18px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="header">
            <p class="eyebrow">WhatsWrapped</p>
            <h1><span class="gradient-name">Your year</span> in texts.</h1>
        </div>

        <p class="section-label">Your chats</p>

        <ul class="chat-list">
            {% for chat in chats %}
            <li>
                <div class="chat-card">
                    <a href="/recap/{{ chat.path }}" class="chat-card-link">
                        <div class="chat-icon">💬</div>
                        <div class="chat-info">
                            <div class="chat-name">{{ chat.name }}</div>
                        </div>
                        <div class="chat-arrow">→</div>
                    </a>
                </div>
            </li>
            {% endfor %}
        </ul>

        {% if not chats %}
        <div class="empty-state">No chats found. Run main.py first!</div>
        {% endif %}
    </div>
</body>
</html>
